name: verify

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Compact verify
        run: python3 scripts/compact_verify.py .
      - name: Wikilink check
        run: python3 scripts/wikilink_check.py .
      - name: Secret-like scan
        run: python3 scripts/added_line_secret_scan.py .
      - name: Git whitespace check
        run: git diff --check HEAD
